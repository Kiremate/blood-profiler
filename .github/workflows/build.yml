name: Build and Test

on:
  push:
    branches: [ main, development ]
  pull_request:
    branches: [ main, development ]
  workflow_dispatch:
    inputs:
      reason:
        description: "Why are you running this manually?"
        required: false
        default: "manual-run"
  merge_group:
    branches: [ main, development ]
jobs:
  build-ubuntu:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          cmake \
          ninja-build \
          libboost-system-dev \
          libboost-dev \
          libssl-dev \
          pkg-config

    - name: Configure CMake
      run: cmake --preset linux-default

    - name: Build
      run: cmake --build --preset linux-default

    - name: Test run
      run: |
        cd build/linux-default/src
        ./agent --help

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: agent-ubuntu
        path: build/linux-default/src/agent

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup MSVC
        uses: microsoft/setup-msbuild@v2

      - name: Bootstrap vcpkg (sets VCPKG_INSTALLATION_ROOT)
        shell: pwsh
        run: |
          git clone --depth 1 https://github.com/microsoft/vcpkg "$env:RUNNER_TEMP\vcpkg"
          & "$env:RUNNER_TEMP\vcpkg\bootstrap-vcpkg.bat"
          "VCPKG_INSTALLATION_ROOT=$env:RUNNER_TEMP\vcpkg" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Install vcpkg dependencies (x64)
        shell: pwsh
        run: |
          & "$env:VCPKG_INSTALLATION_ROOT\vcpkg.exe" install boost-headers:x64-windows boost-asio:x64-windows boost-system:x64-windows openssl:x64-windows

      - name: Configure CMake (vcpkg toolchain)
        shell: pwsh
        run: >
          cmake --preset windows-default
          -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT\scripts\buildsystems\vcpkg.cmake"
          -DVCPKG_TARGET_TRIPLET=x64-windows
      - name: Build
        shell: pwsh
        run: cmake --build --preset windows-default --config Release

      - name: Test run
        shell: pwsh
        run: |
          cd build/windows-default/src/Release
          .\agent.exe --help

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: agent-windows
          path: build/windows-default/src/Release/agent.exe
